name: Quality Metrics Dashboard

on:
  push:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: read

jobs:
  generate-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # For GitHub Pages deployment
    env:
      VIRTUAL_ENV: ${{ github.workspace }}/.venv
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install dependencies in .venv
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install -e .
          pip install -r requirements-dev.txt

      - name: Generate metrics.json via script mode
        run: |
          . .venv/bin/activate
          python scripts/collect_metrics.py \
            --project-name start-green-stay-green \
            --output docs/metrics.json \
            --metrics-mode script \
            --scripts-dir scripts/ \
            --docs-file docs-report.txt

      - name: Regenerate dashboard.html from template
        run: |
          . .venv/bin/activate
          python scripts/regenerate_dashboard.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: false

      - name: Summary
        run: |
          echo "## 📊 Metrics Dashboard Updated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Dashboard URL: https://geoffe-ga.github.io/start_green_stay_green/dashboard.html" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Latest Metrics" >> $GITHUB_STEP_SUMMARY
          jq -r '.metrics | to_entries | .[] | "- **\(.key)**: \(.value)"' docs/metrics.json >> $GITHUB_STEP_SUMMARY || true
